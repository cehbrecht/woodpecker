name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  format:
    name: Ruff Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Install dev dependencies
        run: |
          PYTHON_BIN=$(python -c 'import sys; print(sys.executable)')
          uv pip install --python "$PYTHON_BIN" -e ".[dev]"
          uv pip install --python "$PYTHON_BIN" -e plugins/woodpecker-atlas-plugin -e plugins/woodpecker-cmip6-plugin -e plugins/woodpecker-cmip6-decadal-plugin -e plugins/woodpecker-cmip7-plugin

      - name: Run Ruff format check
        run: ruff format --check .

  lint:
    name: Ruff Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Install dev dependencies
        run: |
          PYTHON_BIN=$(python -c 'import sys; print(sys.executable)')
          uv pip install --python "$PYTHON_BIN" -e ".[dev]"
          uv pip install --python "$PYTHON_BIN" -e plugins/woodpecker-atlas-plugin -e plugins/woodpecker-cmip6-plugin -e plugins/woodpecker-cmip6-decadal-plugin -e plugins/woodpecker-cmip7-plugin

      - name: Run Ruff
        run: make lint

  tests:
    name: Tests (${{ matrix.profile }}, Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        profile: ["minimal", "full"]
        exclude:
          - python-version: "3.11"
            profile: "full"
          - python-version: "3.13"
            profile: "full"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Install test dependencies (minimal)
        if: matrix.profile == 'minimal'
        run: |
          PYTHON_BIN=$(python -c 'import sys; print(sys.executable)')
          uv pip install --python "$PYTHON_BIN" -e ".[dev]"
          uv pip install --python "$PYTHON_BIN" -e plugins/woodpecker-atlas-plugin -e plugins/woodpecker-cmip6-plugin -e plugins/woodpecker-cmip6-decadal-plugin -e plugins/woodpecker-cmip7-plugin

      - name: Install test dependencies (full io)
        if: matrix.profile == 'full'
        run: |
          PYTHON_BIN=$(python -c 'import sys; print(sys.executable)')
          uv pip install --python "$PYTHON_BIN" -e ".[dev,full]"
          uv pip install --python "$PYTHON_BIN" -e plugins/woodpecker-atlas-plugin -e plugins/woodpecker-cmip6-plugin -e plugins/woodpecker-cmip6-decadal-plugin -e plugins/woodpecker-cmip7-plugin

      - name: Run tests
        run: make test
