name: Build and Deploy Docs

on:
  push:
    paths:
      - "woodpecker/fixes/**"
      - "woodpecker/**"
      - "scripts/**"
      - "docs/**"
      - "mkdocs.yml"
      - "pyproject.toml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  docs-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Install package + docs deps
        run: |
          PYTHON_BIN=$(python -c 'import sys; print(sys.executable)')
          uv pip install --python "$PYTHON_BIN" -e ".[docs]"
          uv pip install --python "$PYTHON_BIN" -e plugins/woodpecker-atlas-plugin -e plugins/woodpecker-cmip6-plugin -e plugins/woodpecker-cmip6-decadal-plugin -e plugins/woodpecker-cmip7-plugin

      - name: Generate fix catalog (MD/JSON)
        run: python scripts/generate_fix_catalog.py

      - name: Generate interactive fixes page
        run: python scripts/generate_fix_webpage.py

      - name: Build MkDocs site
        run: NO_MKDOCS_2_WARNING=1 mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  docs-deploy:
    if: github.ref == 'refs/heads/main'
    needs: docs-build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
