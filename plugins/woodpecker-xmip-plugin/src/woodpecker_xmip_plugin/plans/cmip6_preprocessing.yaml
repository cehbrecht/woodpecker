plans:
  - id: xmip.cmip6_preprocessing
    aliases:
      - xmip.combined_preprocessing
      - xmip.cmip6_combined_preprocessing_compat
    description: >-
      Woodpecker-native xMIP-style CMIP6 preprocessing. This plan composes
      small, inspectable fixes instead of hiding the workflow in one monolithic
      preprocessing function.
    match:
      attrs:
        project_id: CMIP6
    links:
      - rel: source
        href: https://github.com/jbusecke/xMIP
        title: Original xMIP project
    steps:
      - id: woodpecker.rename_variables
        options:
          mapping:
            x: [i, ni, xh, nlon]
            y: [j, nj, yh, nlat]
            lev: [deptht, olevel, zlev, olev, depth]
            bnds: [bnds, axis_nbounds, d2]
            vertex: [vertex, nvertex, vertices, nvertices]
            lon: [longitude, nav_lon]
            lat: [latitude, nav_lat]
            lev_bounds: [deptht_bounds, lev_bnds, olevel_bounds, zlev_bnds]
            lon_bounds:
              - bounds_lon
              - bounds_nav_lon
              - lon_bnds
              - x_bnds
              - vertices_longitude
              - longitude_bnds
            lat_bounds:
              - bounds_lat
              - bounds_nav_lat
              - lat_bnds
              - y_bnds
              - vertices_latitude
              - latitude_bnds
            time_bounds: [time_bnds]
      - id: woodpecker.promote_missing_dimension_coords
      - id: woodpecker.set_coordinate_variables
        options:
          coordinates:
            - x
            - y
            - lon
            - lat
            - lev
            - bnds
            - lev_bounds
            - lon_bounds
            - lat_bounds
            - time_bounds
            - lat_verticies
            - lon_verticies
      - id: xmip.broadcast_lon_lat
      - id: woodpecker.normalize_longitude_convention
        options:
          coordinate: lon
          target: "0_360"
          bounds: [lon_bounds]
          mask_abs_gt: 1000
      - id: woodpecker.convert_units
        options:
          units:
            lev: m
          overrides:
            so:
      - id: xmip.normalize_lon_lat_bounds
      - id: xmip.sort_vertex_order
      - id: xmip.convert_bounds_to_vertices
      - id: xmip.convert_vertices_to_bounds
      - id: xmip.fix_known_cmip6_metadata
      - id: woodpecker.drop_variables
        options:
          variables: [bnds, vertex]
          errors: ignore

  - id: xmip.cmip6_preprocessing_nominal_xy
    description: >-
      Extended CMIP6 preprocessing that also replaces x/y coordinate values
      with nominal longitude/latitude values derived from the grid.
    match:
      attrs:
        project_id: CMIP6
    steps:
      - id: woodpecker.rename_variables
        options:
          mapping:
            x: [i, ni, xh, nlon]
            y: [j, nj, yh, nlat]
            lev: [deptht, olevel, zlev, olev, depth]
            bnds: [bnds, axis_nbounds, d2]
            vertex: [vertex, nvertex, vertices, nvertices]
            lon: [longitude, nav_lon]
            lat: [latitude, nav_lat]
            lev_bounds: [deptht_bounds, lev_bnds, olevel_bounds, zlev_bnds]
            lon_bounds:
              - bounds_lon
              - bounds_nav_lon
              - lon_bnds
              - x_bnds
              - vertices_longitude
              - longitude_bnds
            lat_bounds:
              - bounds_lat
              - bounds_nav_lat
              - lat_bnds
              - y_bnds
              - vertices_latitude
              - latitude_bnds
            time_bounds: [time_bnds]
      - id: woodpecker.promote_missing_dimension_coords
      - id: woodpecker.set_coordinate_variables
        options:
          coordinates:
            - x
            - y
            - lon
            - lat
            - lev
            - bnds
            - lev_bounds
            - lon_bounds
            - lat_bounds
            - time_bounds
            - lat_verticies
            - lon_verticies
      - id: xmip.broadcast_lon_lat
      - id: woodpecker.normalize_longitude_convention
        options:
          coordinate: lon
          target: "0_360"
          bounds: [lon_bounds]
          mask_abs_gt: 1000
      - id: xmip.replace_xy_with_nominal_lon_lat
      - id: woodpecker.convert_units
        options:
          units:
            lev: m
          overrides:
            so:
      - id: xmip.normalize_lon_lat_bounds
      - id: xmip.sort_vertex_order
      - id: xmip.convert_bounds_to_vertices
      - id: xmip.convert_vertices_to_bounds
      - id: xmip.fix_known_cmip6_metadata
      - id: woodpecker.drop_variables
        options:
          variables: [bnds, vertex]
          errors: ignore
