site_name: Woodpecker Fixes
theme:
  name: material
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - content.code.copy
    - content.tabs.link
  palette:
    - scheme: default
      primary: teal
      accent: blue
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
plugins:
  - search
  - mkdocs-jupyter:
      execute: true
      allow_errors: false
      kernel_name: python3
nav:
  - Home: index.md
  - Getting Started:
      - Overview: OVERVIEW.md
      - Concepts: concepts.md
      - Discovered Recipes: recipes.md
      - CLI: cli.md
      - Plugins: plugins.md
      - Examples: examples.md
      - User Friendliness Ideas: user-friendliness.md
  - Reference:
      - Generated Fixes Reference: FIXES.md
      - Generated Recipes Reference: recipe-reference.md
      - Interactive Fix Browser: fixes.html
  - Examples:
      - Direct CMIP6 API: notebooks/cmip6_core_api_example.ipynb
      - CMIP6 Recipe: notebooks/cmip6_core_recipe_example.ipynb
      - Auto Recipe Store: notebooks/auto_recipe_store_example.ipynb
      - RecipeCatalog: notebooks/recipe_catalog_example.ipynb
      - DuckDB Recipe Store: notebooks/duckdb_recipe_store_example.ipynb
      - Atlas Recipe: notebooks/atlas_recipe_example.ipynb
      - ESA CCI Recipe: notebooks/esa_cci_recipe_example.ipynb
      - xMIP Plugin Demo: notebooks/xmip_plugin_demo.ipynb
  - Contributing:
      - Guide: CONTRIBUTING_GUIDE.md
      - Docs Development: docs-development.md
